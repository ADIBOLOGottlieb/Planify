name: planify
description: Application mobile de gestion et planification des dépenses personnelles

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Charts
  fl_chart: ^0.68.0

  # UI
  google_fonts: ^6.1.0


  # Shared Preferences
  shared_preferences: ^2.2.2

  # UUID
  uuid: ^4.3.3

  # Intl
  intl: ^0.20.2

  # Lottie
  lottie: ^3.1.2

  # Media / Storage
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Export
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.12.0
  share_plus: ^10.1.2

  # Calendar
  table_calendar: ^3.1.2

  # API / Secure storage
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2

  # Icons
  cupertino_icons: ^1.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/receipts/
